<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Approval Queue — ProcureChain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="hdr"></div>
  <main class="flex-1 max-w-5xl mx-auto px-6 py-8 w-full">
    <div class="mb-6">
      <h1 class="text-3xl font-bold tracking-tight">Approval queue</h1>
      <p class="text-sm text-slate-600 mt-1">
        Every tender passes <b>4 independent reviews</b>:
        department → financial → compliance → final.
        Each decision is permanently recorded on the audit chain.
      </p>
    </div>

    <!-- Stage legend -->
    <div class="flex items-center gap-2 text-xs mb-4 flex-wrap">
      <span class="text-slate-500">Workflow:</span>
      <span class="badge bg-slate-100 text-slate-700 border-slate-200">1. department</span>
      <span class="text-slate-400">→</span>
      <span class="badge bg-slate-100 text-slate-700 border-slate-200">2. financial</span>
      <span class="text-slate-400">→</span>
      <span class="badge bg-slate-100 text-slate-700 border-slate-200">3. compliance</span>
      <span class="text-slate-400">→</span>
      <span class="badge bg-slate-100 text-slate-700 border-slate-200">4. final</span>
    </div>

    <div id="queue" class="space-y-3"></div>
    <div id="history" class="mt-10"></div>
  </main>

  <!-- decision modal -->
  <div id="modal" class="hidden pc-modal-backdrop">
    <div class="pc-modal">
      <h2 id="m-title" class="font-bold text-lg mb-1"></h2>
      <p id="m-sub" class="text-sm text-slate-500 mb-4"></p>
      <form id="form" class="space-y-3">
        <textarea name="comments" rows="3" placeholder="Comments (optional)" class="input"></textarea>
        <div class="flex justify-end gap-2">
          <button type="button" id="m-cancel" class="btn btn-secondary">Cancel</button>
          <button type="button" id="m-reject" class="btn btn-danger">Reject</button>
          <button type="button" id="m-approve" class="btn btn-success">Approve</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    const user = requireAuth(['officer','compliance_officer','auditor','admin']);
    renderHeader(document.getElementById('hdr'));

    document.getElementById('queue').innerHTML =
      Array.from({length:2}, () => `<div class="pc-card pc-card-pad">${skeletonLines(2)}</div>`).join('');

    let activeTender = null;

    async function loadQueue() {
      try {
        const q = await api('/api/approvals/queue');
        const el = document.getElementById('queue');
        if (!q.length) {
          el.innerHTML = '<div class="pc-card pc-card-pad"><div class="pc-empty">Nothing in your queue. You\'re all caught up.</div></div>';
        } else {
          el.innerHTML = q.map(t => `
            <div class="pc-card pc-card-pad pc-card-hover flex items-center justify-between flex-wrap gap-3">
              <div>
                <div class="font-semibold">${escapeHtml(t.title)}</div>
                <div class="text-xs text-slate-500 mt-1">
                  ${escapeHtml(t.category)} · ${escapeHtml(t.region)} · budget ${fmtMoney(t.budget)} · created by ${escapeHtml(t.created_by)}
                </div>
                <div class="mt-2 flex flex-wrap gap-2">${stageBadge(t.stage)} ${statusBadge(t.status)}</div>
              </div>
              <button data-id="${t.tender_id}" data-stage="${t.stage}" data-title="${escapeHtml(t.title)}"
                class="open-modal btn btn-primary">Review →</button>
            </div>`).join('');
          el.querySelectorAll('.open-modal').forEach(b => b.onclick = () => openModal(b.dataset));
        }
      } catch (e) { document.getElementById('queue').innerHTML = `<div class="text-rose-600">${e.message}</div>`; }

      // Recent history — compact rows, expandable per tender
      const tenders = await api('/api/tenders');
      let html = `<div class="flex items-center justify-between mb-3 mt-2 flex-wrap gap-2">
                    <h2 class="text-xl font-bold">Recent approval history</h2>
                    <button id="expand-all" class="text-xs text-slate-500 hover:text-slate-900 underline-offset-2 hover:underline">expand all</button>
                  </div>
                  <div class="pc-card divide-y">`;
      let any = false;
      for (const t of tenders.slice(0, 10)) {
        const approvals = await api(`/api/tenders/${t.id}/approvals`);
        if (!approvals.length) continue;
        any = true;

        const approved = approvals.filter(a => a.decision === 'approved').length;
        const rejected = approvals.filter(a => a.decision === 'rejected').length;
        const summary = rejected
          ? `<span class="text-xs text-rose-700">${rejected} rejection${rejected>1?'s':''}</span>`
          : `<span class="text-xs text-slate-500">${approved} of 4 signed</span>`;

        html += `<div class="approval-row">
          <button type="button" class="approval-toggle w-full text-left p-4 hover:bg-slate-50 flex items-center gap-3 flex-wrap" data-target="ap-${t.id}">
            <span class="approval-caret text-slate-400 text-xs w-3">▸</span>
            <span class="font-semibold flex-1 min-w-0 truncate">${escapeHtml(t.title)}</span>
            ${summary}
            ${statusBadge(t.status)}
          </button>
          <div id="ap-${t.id}" class="hidden px-4 pb-4">
            <div class="grid gap-1.5 text-xs border-l-2 border-slate-100 pl-3 ml-3">
              ${approvals.map(a => `
                <div class="flex items-center gap-2 flex-wrap">
                  ${stageBadge(a.stage)}
                  <span class="badge ${a.decision==='approved'?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-rose-50 text-rose-700 border-rose-200'}">${a.decision}</span>
                  <span class="text-slate-700">${escapeHtml(a.approver_name)} <span class="text-slate-400">(${a.approver_role})</span></span>
                  <span class="text-slate-400">${fmtDate(a.created_at)}</span>
                  ${a.comments ? `<span class="text-slate-500">— ${escapeHtml(a.comments)}</span>` : ''}
                </div>`).join('')}
            </div>
          </div>
        </div>`;
      }
      html += '</div>';
      const histEl = document.getElementById('history');
      histEl.innerHTML = any ? html : '';

      // Toggle handlers
      histEl.querySelectorAll('.approval-toggle').forEach(btn => {
        btn.onclick = () => {
          const target = document.getElementById(btn.dataset.target);
          const caret = btn.querySelector('.approval-caret');
          const open = !target.classList.contains('hidden');
          target.classList.toggle('hidden', open);
          caret.textContent = open ? '▸' : '▾';
        };
      });
      const expandBtn = document.getElementById('expand-all');
      if (expandBtn) {
        let allOpen = false;
        expandBtn.onclick = () => {
          allOpen = !allOpen;
          histEl.querySelectorAll('.approval-toggle').forEach(btn => {
            const target = document.getElementById(btn.dataset.target);
            const caret = btn.querySelector('.approval-caret');
            target.classList.toggle('hidden', !allOpen);
            caret.textContent = allOpen ? '▾' : '▸';
          });
          expandBtn.textContent = allOpen ? 'collapse all' : 'expand all';
        };
      }
    }

    function openModal(ds) {
      activeTender = ds;
      document.getElementById('m-title').textContent = `Review: ${ds.title}`;
      document.getElementById('m-sub').textContent = `Stage: ${ds.stage}. Your decision and comments will be permanently logged.`;
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    document.getElementById('m-cancel').onclick = closeModal;
    document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
    document.getElementById('m-approve').onclick = () => submit('approved');
    document.getElementById('m-reject').onclick  = () => submit('rejected');

    async function submit(decision) {
      const comments = document.querySelector('#form [name=comments]').value;
      try {
        await api(`/api/tenders/${activeTender.id}/approve`, {
          method: 'POST', body: { decision, comments },
        });
        closeModal();
        document.querySelector('#form [name=comments]').value = '';
        toast(decision === 'approved' ? 'Approved.' : 'Rejected.', decision==='approved'?'success':'warn');
        loadQueue();
      } catch (e) { toast(e.message, 'error'); }
    }

    loadQueue();
  </script>
</body>
</html>
