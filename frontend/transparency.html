<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Public Projects — GovTrust</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="hdr"></div>
  <main class="flex-1 max-w-6xl mx-auto px-6 py-8 w-full">
    <div class="mb-6 flex items-end justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Public projects</h1>
        <p class="text-slate-600 text-sm mt-1 max-w-2xl">
          Every public tender, bid count, AI risk score and project progress —
          no login required. <strong>Click any awarded project</strong> to inspect
          milestones, evidence, and beneficiary delivery proof.
        </p>
      </div>
      <div class="flex gap-2 items-center">
        <input id="q" type="search" class="input" style="width:240px" placeholder="Search title / region / category…" />
        <a href="/opendata.html" class="btn btn-secondary btn-sm">Download CSV</a>
      </div>
    </div>

    <div class="pc-card overflow-x-auto">
      <table class="pc-table">
        <thead>
          <tr>
            <th>Project</th>
            <th>Region</th>
            <th class="text-right">Budget</th>
            <th>Status</th>
            <th>Contractor</th>
            <th class="text-right">Awarded</th>
            <th class="text-center">Risk</th>
            <th>Progress</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    renderHeader(document.getElementById('hdr'));
    let allRows = [];

    document.getElementById('rows').innerHTML = skeletonRows(8, 4);

    (async () => {
      try {
        allRows = await api('/api/transparency/projects');
        render(allRows);
      } catch (e) {
        document.getElementById('rows').innerHTML = `<tr><td colspan="8" class="p-6 text-center text-rose-600">${e.message}</td></tr>`;
      }
    })();

    document.getElementById('q').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) return render(allRows);
      render(allRows.filter(r => [r.title, r.region, r.category, r.contractor].some(x => (x||'').toLowerCase().includes(q))));
    });

    function render(data) {
      const rows = document.getElementById('rows');
      if (!data.length) { rows.innerHTML = '<tr><td colspan="8"><div class="pc-empty">No matching projects.</div></td></tr>'; return; }
      rows.innerHTML = data.map(p => {
        const overBudget = p.awarded_amount && p.budget && p.awarded_amount > p.budget;
        const overPct = overBudget ? Math.round(100 * (p.awarded_amount - p.budget) / p.budget) : 0;
        const href = p.contract_id ? `/contract.html?id=${p.contract_id}` : null;
        const titleCell = href
          ? `<a href="${href}" class="pc-link font-semibold">${escapeHtml(p.title)}</a>
             <div class="text-xs text-slate-500">${escapeHtml(p.category)}</div>`
          : `<div class="font-semibold">${escapeHtml(p.title)}</div>
             <div class="text-xs text-slate-500">${escapeHtml(p.category)} <span class="text-slate-400">· tender open</span></div>`;
        return `
        <tr class="${href ? 'pc-row-link' : ''}" ${href ? `data-href="${href}"` : ''} ${overBudget ? 'style="background:#fff7f7"' : ''}>
          <td>${titleCell}</td>
          <td>${escapeHtml(p.region)}</td>
          <td class="text-right tabular-nums">${fmtMoney(p.budget)}</td>
          <td>${statusBadge(p.status)}</td>
          <td>${p.contractor ? escapeHtml(p.contractor) : '<span class="text-slate-400">—</span>'}</td>
          <td class="text-right tabular-nums">${href ? `<span class="${overBudget ? 'text-rose-700 font-semibold' : ''}">${fmtMoney(p.awarded_amount)}</span>` : fmtMoney(p.awarded_amount)}${overBudget ? `<div class="text-[10px] text-rose-600 font-semibold mt-0.5">+${overPct}% over budget</div>` : ''}</td>
          <td class="text-center">${p.avg_risk !== null ? riskBadgeFromScore(p.avg_risk) : '<span class="text-slate-400">—</span>'}</td>
          <td>${p.progress_status ? progressBar(p.progress_percent, p.progress_status) : '<span class="text-slate-400">—</span>'}</td>
        </tr>`;
      }).join('');

      // Make whole row clickable (except when user clicked an inner link)
      rows.querySelectorAll('tr.pc-row-link').forEach(tr => {
        tr.style.cursor = 'pointer';
        tr.title = 'Open project details — milestones, evidence, delivery proof';
        tr.addEventListener('click', (e) => {
          if (e.target.closest('a,button,input')) return;
          window.location.href = tr.dataset.href;
        });
      });
    }

    function riskBadgeFromScore(score) {
      const level = score >= 60 ? 'High' : score >= 30 ? 'Medium' : 'Low';
      return riskBadge(level, score);
    }
    function progressBar(pct, status) {
      return `<div class="w-36">
        <div class="text-xs text-slate-600 mb-1">${(status||'').replaceAll('_',' ')} <span class="text-slate-400">· ${pct}%</span></div>
        <div class="pc-progress"><span style="width:${Math.max(0,Math.min(100,pct))}%"></span></div>
      </div>`;
    }
  </script>
</body>
</html>
