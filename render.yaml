services:
  - type: web
    name: govtrust
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      # Free tier has ephemeral storage only. The seed script reruns on every
      # cold start, so demo data is always reproducible. Uploaded evidence
      # files and any newly created tenders are lost when the dyno sleeps.
      # To make data persistent, upgrade `plan: free` to `plan: starter` and
      # re-add the `disk:` block below.
      - key: GOVTRUST_DATA_DIR
        value: /tmp/govtrust
      - key: DATABASE_URL
        value: sqlite:////tmp/govtrust/app.db
